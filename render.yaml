services:
  - type: web
    name: autoparts-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
```

**Create `backend/Procfile`** inside `backend/` folder:
```
web: uvicorn main:app --host 0.0.0.0 --port $PORT